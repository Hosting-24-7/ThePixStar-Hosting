<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThePixStar - Sign Up</title>
    <link rel="stylesheet" href="style.css"> <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #38bdf8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #0ea5e9; }
    </style>
</head>
<body>

<div class="box">
    <h2>Join ThePixStar</h2>
    <input type="text" id="username" placeholder="Username" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="button" onclick="registerUser()">Sign Up & Get 1GB</button>
    <p><a href="login.html" style="color: #38bdf8; text-decoration: none;">Already have an account?</a></p>
</div>

<script src="signup.js"></script>

</body>
</html>
